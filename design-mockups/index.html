<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heißhunger — Design-Vorschau</title>
<style>
  :root{
    --bg:#EDEEF0; --panel:#FFFFFF; --ink:#1C1E22; --muted:#6B7078; --line:#D6D8DC; --accent:#3D5AFE;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#131417; --panel:#1B1D22; --ink:#EDEEF2; --muted:#9195A0; --line:#2C2F36; --accent:#7C93FF; }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .card{ max-width:640px; padding:48px; }
  .eyebrow{ font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); font-weight:700; margin:0 0 10px; }
  h1{ font-size:1.9rem; margin:0 0 16px; letter-spacing:-.01em; }
  p{ color:var(--muted); line-height:1.6; margin:0 0 28px; }
  .links{ display:flex; flex-direction:column; gap:14px; }
  a.link{
    display:flex; flex-direction:column; gap:4px; padding:18px 20px; border-radius:8px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink); text-decoration:none;
  }
  a.link:hover{ border-color:var(--accent); }
  a.link .title{ font-weight:700; }
  a.link .sub{ font-size:.85rem; color:var(--muted); }
</style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Heißhunger — E-Book</p>
    <h1>Design-Vorschau</h1>
    <p>Heißhunger — E-Book von Christian Wolf, Richtung D.</p>
    <div class="links">
      <a class="link" href="book-viewer.html">
        <span class="title">Buch-Vorschau — alle 35 Seiten</span>
        <span class="sub">Zwei Seiten nebeneinander, echtes Umblättern — der aktuelle Stand des kompletten Buchs</span>
      </a>
      <a class="link" href="direction-comparison.html">
        <span class="title">Erster Entwurf — CSS-Mockup</span>
        <span class="sub">Frühere Version, System-Fonts als Annäherung, nur zur Historie</span>
      </a>
    </div>
  </div>
</body>
</html>
